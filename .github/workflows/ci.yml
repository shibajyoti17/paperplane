name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust
        run: cargo build --workspace || true
